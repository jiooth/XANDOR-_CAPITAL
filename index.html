<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Xandor Capital AR Experience</title>
    
    <script src="https://aframe.io/releases/1.2.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.1/dist/mindar-image-aframe.prod.js"></script>
    
    <style>
        /* Pure transparent window view for camera */
        html, body { 
            margin: 0; 
            padding: 0; 
            width: 100%; 
            height: 100%; 
            overflow: hidden; 
            background-color: transparent !important; 
            font-family: 'Segoe UI', Arial, sans-serif; 
        }
        
        /* Forcing AR Scene canvas layer to be fully transparent background */
        a-scene {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 1;
            background: none !important;
            background-color: transparent !important;
        }

        .a-canvas {
            background-color: transparent !important;
        }

        /* HIDING MIND-AR DEFAULT BLUE LOADING SPINNER AND OVERLAYS */
        .mindar-ui-loading, .mindar-ui-compatibility, .mindar-ui-scanning {
            display: none !important;
            opacity: 0 !important;
            pointer-events: none !important;
        }

        /* Floating Premium Gold Buttons UI Container (Centered & Raised Higher) */
        .ui-container {
            position: fixed;
            bottom: 12% !important; /* Buttons shifted further up from the bottom edge */
            left: 50%;
            transform: translateX(-50%);
            width: 82%;
            max-width: 320px;
            z-index: 99999 !important; 
            display: flex;
            flex-direction: column;
            gap: 14px; /* Slightly increased gap for premium look */
            background: transparent !important;
            background-color: transparent !important;
        }
        
        .action-btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #D4AF37 0%, #AA7C11 100%);
            border: 1px solid rgba(255,255,255,0.3);
            border-radius: 12px;
            color: #000000;
            font-size: 15px;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 1px;
            text-align: center;
            text-decoration: none;
            box-shadow: 0 8px 25px rgba(0,0,0,0.6);
            display: block;
        }

        /* Scanning Transparent Overlay Grid */
        #scanning-overlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.4); 
            z-index: 9999;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            color: #fff;
        }
        .scan-box {
            width: 240px; height: 150px; 
            border: 3px dashed #D4AF37;
            border-radius: 12px;
            margin-bottom: 25px;
        }
        .scan-text { color: #D4AF37; font-weight: bold; letter-spacing: 1px; font-size: 18px; text-transform: uppercase;}
    </style>
</head>
<body>

    <div id="scanning-overlay">
        <div class="scan-box"></div>
        <div class="scan-text">Scan Business Card</div>
        <p style="color: #ccc; font-size: 13px; margin-top: 8px;">Point your camera at the front of the card</p>
    </div>

    <div class="ui-container" id="uiContainer" style="display: none;">
        <a href="https://your-business-opportunity-link.com" target="_blank" class="action-btn">Business Opportunity</a>
        <a href="tel:+919999999999" class="action-btn">Call Now</a>
        <a href="https://your-main-website.com" target="_blank" class="action-btn">Visit Website</a>
    </div>

    <a-scene mindar-image="imageTargetSrc: ./targets.mind; autoStart: true; uiLoading: no; uiScanning: no;" 
             embedded vr-mode-ui="enabled: false" 
             device-orientation-permission-ui="enabled: false"
             color-space="sRGB" renderer="colorManagement: true, physicallyCorrectLights: true">
        
        <a-assets>
            <video id="arVideo" src="./myvideo.mp4" preload="auto" loop="true" crossorigin="anonymous" playsinline webkit-playsinline></video>
        </a-assets>

        <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

        <a-entity id="cardTarget" mindar-image-target="targetIndex: 0">
            <a-video src="#arVideo" position="0 0 0.15" height="0.55" width="1" rotation="0 0 0"></a-video>
        </a-entity>
    </a-scene>

    <script>
        // Force Camera Permission Prompt on Page Load
        window.addEventListener('DOMContentLoaded', () => {
            if (navigator.mediaDevices && navigator.mediaDevices.getUserMedia) {
                navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } })
                .then(function(stream) {
                    stream.getTracks().forEach(track => track.stop());
                })
                .catch(function(err) {
                    alert("Camera Blocked! Please allow camera permission from site settings.");
                });
            }
        });

        const targetEntity = document.querySelector('#cardTarget');
        const videoElement = document.querySelector('#arVideo');
        const uiContainer = document.querySelector('#uiContainer');
        const overlay = document.querySelector('#scanning-overlay');

        targetEntity.addEventListener("targetFound", event => {
            videoElement.play(); 
            overlay.style.display = "none";
            uiContainer.style.display = "flex"; 
        });

        targetEntity.addEventListener("targetLost", event => {
            videoElement.pause(); 
            overlay.style.display = "flex";
            uiContainer.style.display = "none"; 
        });
    </script>
</body>
</html>
