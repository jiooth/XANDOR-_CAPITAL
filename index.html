<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Xandor Capital</title>
    
    <script src="https://aframe.io/releases/1.2.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.1/dist/mindar-image-aframe.prod.js"></script>
    
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: 'Segoe UI', Arial, sans-serif; }
        
        /* Premium Gold Buttons UI Container */
        .ui-container {
            position: fixed;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%);
            width: 85%;
            max-width: 340px;
            z-index: 9999;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        
        .action-btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #D4AF37 0%, #AA7C11 100%);
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 12px;
            color: #000000;
            font-size: 15px;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 1px;
            text-align: center;
            text-decoration: none;
            box-shadow: 0 8px 20px rgba(0,0,0,0.5);
            display: block;
        }

        /* Scanning Overlay Grid */
        #scanning-overlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.6);
            z-index: 999;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            color: #fff;
        }
        .scan-box {
            width: 240px; height: 150px; /* Standard Business Card Ratio */
            border: 3px dashed #D4AF37;
            border-radius: 12px;
            margin-bottom: 25px;
        }
        .scan-text { color: #D4AF37; font-weight: bold; letter-spacing: 1px; font-size: 18px; text-transform: uppercase;}
    </style>
</head>
<body>

    <div id="scanning-overlay">
        <div class="scan-box"></div>
        <div class="scan-text">Scan Business Card</div>
        <p style="color: #ccc; font-size: 13px; margin-top: 8px;">Point your camera at the front of the card</p>
    </div>

    <div class="ui-container" id="uiContainer" style="display: none;">
        <a href="https://my-profile-10.blogspot.com/p/business-oppertunity.html" target="_blank" class="action-btn">Business Opportunity</a>
        <a href="tel:+918129848820" class="action-btn">Call Now</a>
        <a href="https://your-main-website.com" target="_blank" class="action-btn">Visit Website</a>
    </div>

    <a-scene mindar-image="imageTargetSrc: ./targets.mind; autoStart: true; uiLoading: no; uiScanning: no;" 
             embedded vr-mode-ui="enabled: false" 
             device-orientation-permission-ui="enabled: false">
        
        <a-assets>
            <video id="arVideo" src="./myvideo.mp4" preload="auto" loop="true" crossorigin="anonymous" playsinline webkit-playsinline></video>
        </a-assets>

        <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

        <a-entity id="cardTarget" mindar-image-target="targetIndex: 0">
            <a-video src="#arVideo" position="0 0 0" height="0.55" width="1" rotation="0 0 0"></a-video>
        </a-entity>
    </a-scene>

    <script>
        // Force Camera Permission Prompt on Page Load
        window.addEventListener('DOMContentLoaded', () => {
            if (navigator.mediaDevices && navigator.mediaDevices.getUserMedia) {
                navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } })
                .then(function(stream) {
                    console.log("Camera access granted by user.");
                    // Stop the stream instantly just to let Mind-AR take over cleanly
                    stream.getTracks().forEach(track => track.stop());
                })
                .catch(function(err) {
                    alert("Camera Blocked! Please allow camera permission from site settings/lock icon.");
                });
            }
        });

        const targetEntity = document.querySelector('#cardTarget');
        const videoElement = document.querySelector('#arVideo');
        const uiContainer = document.querySelector('#uiContainer');
        const overlay = document.querySelector('#scanning-overlay');

        targetEntity.addEventListener("targetFound", event => {
            videoElement.play(); 
            overlay.style.display = "none";
            uiContainer.style.display = "flex"; 
        });

        targetEntity.addEventListener("targetLost", event => {
            videoElement.pause(); 
            overlay.style.display = "flex";
            uiContainer.style.display = "none"; 
        });
    </script>
</body>
</html>
